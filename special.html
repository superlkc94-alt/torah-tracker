<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light only">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>특별 낭독 주간 - 토라 포션 트래커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --bg-card: #ffffff;
      --bg-primary: #ffffff;
      --bg-info: #DEEBF8;
      --text: #1c1a16;
      --text2: #5a5a5a;
      --text3: #999;
      --accent: #195FA4;
      --text-info: #195FA4;
      --border: rgba(0,0,0,0.09);
      --border-tertiary: rgba(0,0,0,0.12);
      --border-accent: #195FA4;
      --radius: 14px;
      --radius-sm: 10px;
      --radius-md: 8px;
    }

    /* 라이트모드 강제 고정 */
    :root, body {
      color-scheme: light only;
      background-color: #f7f6f2 !important;
      color: #1c1a16 !important;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 0;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 1.25rem 3rem;
    }

    /* 상단 네비 */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 48px;
      padding: 0;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    .nav-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-info); text-decoration: none;
      padding: 6px 12px; border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-md); background: var(--bg-primary);
      transition: all .15s; white-space: nowrap;
      height: 32px; box-sizing: border-box;
    }
    .nav-btn:hover { border-color: var(--text-info); background: var(--bg-info); }
    @media (max-width: 800px) {
      .top-nav { height: 48px; }
      .nav-btn { font-size: 12px; padding: 5px 10px; height: 30px; }
      .btn-label { display: none; }
    }

    /* 메인 카드 */
    .main-card {
      background: var(--bg-info);
      border: 1.5px solid var(--border-accent);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .special-icon {
      font-size: 48px;
      margin-bottom: 1rem;
    }

    .special-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .special-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Noto Serif KR', serif;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .special-desc {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.7;
    }

    /* 명절 이름 */
    .holiday-name {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 1rem;
    }

    /* 이전/다음 포션 카드 */
    .parsha-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .parsha-nav-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      text-decoration: none;
      color: inherit;
      transition: all .15s;
    }
    .parsha-nav-card:hover { border-color: var(--accent); }

    .parsha-nav-label {
      font-size: 11px;
      color: #777;
      margin-bottom: 4px;
    }

    .parsha-nav-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
    }

    .parsha-nav-date {
      font-size: 11px;
      color: #777;
      margin-top: 3px;
    }

    /* 명절 설명 카드 */
    .holiday-desc-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
    }

    .holiday-desc-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Noto Serif KR', serif;
      display: block;
      margin-bottom: 0.6rem;
    }

    .holiday-desc-text {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.85;
    }

    /* 날짜 - 숨김 */
    .shabbat-date { display: none; }

    /* 로딩 */
    .loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 50vh; gap: 12px;
      color: var(--text3); font-size: 14px;
    }
    .sp {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .parsha-nav { grid-template-columns: 1fr; }
      .main-card { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="top-nav">
    <a href="calendor_timeline.html" class="nav-btn"><i class="ti ti-list"></i><span class="btn-label"> 타임라인 보기</span></a>
    <a href="calendar.html" class="nav-btn"><i class="ti ti-calendar"></i><span class="btn-label"> 캘린더 보기</span></a>
  </div>

  <div id="app">
    <div class="loading"><div class="sp"></div><span>정보 불러오는 중...</span></div>
  </div>

</div>
<script>
  const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const PKO = {
    'Bereshit':'베레쉬트','Noach':'노아흐','Lech-Lecha':'레흐-레하',
    'Vayeira':'바예라','Chayei Sara':'하예 사라','Toldot':'톨도트',
    'Vayetzei':'바예체이','Vayishlach':'바이쉴라흐','Vayeshev':'바예쉐브',
    'Miketz':'미케쯔','Vayigash':'바이가쉬','Vayechi':'바예히',
    'Shemot':'쉐모트','Vaeira':'바에라','Bo':'보',
    'Beshalach':'베샬라흐','Yitro':'이트로','Mishpatim':'미쉬파팀',
    'Terumah':'테루마','Tetzaveh':'테짜베','Ki Tisa':'키 티사',
    'Vayakhel':'바야크헬','Pekudei':'페쿠데이','Vayakhel-Pekudei':'바야크헬-페쿠데이',
    'Vayikra':'바이크라','Tzav':'짜브','Shmini':'쉬미니',
    'Tazria':'타즈리아','Metzora':'메쪼라','Tazria-Metzora':'타즈리아-메쪼라',
    'Achrei Mot':'아하레이 모트','Kedoshim':'카도쉼','Achrei Mot-Kedoshim':'아하레이 모트-카도쉼',
    'Emor':'에모르','Behar':'베하르','Bechukotai':'베호코타이',
    'Behar-Bechukotai':'베하르-베호코타이',
    'Bamidbar':'베미드바르','Nasso':'나쏘',"Beha'alotcha":'베하알로트카',
    "Sh'lach":'쉘라흐','Korach':'코라흐','Chukat':'후카트',
    'Balak':'발락','Chukat-Balak':'후카트-발락','Pinchas':'핀하스',
    'Matot':'마토트','Masei':'마세이','Matot-Masei':'마토트-마세이',
    'Devarim':'데바림','Vaetchanan':'바에트하난','Eikev':'에케브',
    "Re'eh":'레에','Shoftim':'쇼프팀','Ki Teitzei':'키 테체이',
    'Ki Tavo':'키 타보','Nitzavim':'니차빔','Vayeilech':'바옐레흐',
    'Nitzavim-Vayeilech':'니차빔-바옐레흐',"Ha'azinu":'하아지누',
    'Vezot Haberakhah':'베조트 하베라하'
  };

  // 명절 한국어 이름
  const HOLIDAY_KO = {
    'Rosh Hashana':'로쉬 하샤나 (유대 새해)',
    'Yom Kippur':'욤 키푸르 (속죄일)',
    'Sukkot':'숙콧 (초막절)',
    'Shemini Atzeret':'쉬미니 아체렛',
    'Simchat Torah':'심핫 토라',
    'Chanukah':'하누카 (수전절)',
    'Purim':'푸림',
    'Pesach':'페사흐 (유월절)',
    'Passover':'페사흐 (유월절)',
    'Shavuot':'샤부옷 (칠칠절)',
    'Tisha B\'Av':'티샤 브아브',
  };

  function pKo(t) {
    const n = t.replace(/^Parashat\s+/i,'').trim()
               .replace(/[\u2018\u2019\u02bc]/g,"'");
    return PKO[n] || n;
  }

  // 명절별 이모지 + 설명
  const HOLIDAY_INFO = {
    'Shavuot': {
      icon: '🌾',
      desc: '유월절(페사흐) 이후 50일째 되는 날로, 하나님께서 시내산에서 이스라엘 백성에게 토라(율법)를 주신 것을 기념하는 절기입니다. 히브리어로 "칠칠절"이라는 뜻으로, 7주를 세어 지키는 절기예요. 신약에서는 성령이 임하신 오순절(펜테코스트)에 해당합니다.'
    },
    'Pesach': {
      icon: '🍷',
      desc: '이집트의 종살이에서 해방된 것을 기념하는 절기로, 하나님께서 이스라엘 가정을 "넘어가신(Pass over)" 것을 기억합니다. 7일간 누룩 없는 빵(마짜)을 먹으며 출애굽을 기억해요. 예슈아(예수님)의 십자가 사건과 깊이 연결된 절기입니다.'
    },
    'Passover': {
      icon: '🍷',
      desc: '이집트의 종살이에서 해방된 것을 기념하는 절기로, 하나님께서 이스라엘 가정을 "넘어가신(Pass over)" 것을 기억합니다. 7일간 누룩 없는 빵(마짜)을 먹으며 출애굽을 기억해요. 예슈아(예수님)의 십자가 사건과 깊이 연결된 절기입니다.'
    },
    'Rosh Hashana': {
      icon: '🍎',
      desc: '히브리어로 "한 해의 머리"라는 뜻으로 유대력 새해입니다. 나팔(쇼파르)을 불며 새해를 맞이하고, 지난 한 해를 돌아보며 하나님 앞에 새롭게 서는 날이에요. 10일간의 경외의 날(야밈 노라임)이 시작되는 절기입니다.'
    },
    'Yom Kippur': {
      icon: '🕍',
      desc: '"속죄의 날"이라는 뜻으로 유대교에서 가장 거룩한 날입니다. 25시간 동안 금식하며 하나님 앞에 회개하고 용서를 구하는 날이에요. 대제사장이 지성소에 들어가 백성의 죄를 속죄하던 날로, 예슈아의 십자가 보혈과 연결되는 절기입니다.'
    },
    'Sukkot': {
      icon: '🌿',
      desc: '"초막(장막)절"이라는 뜻으로, 광야 40년 동안 하나님이 이스라엘을 인도하신 것을 기념합니다. 7일 동안 초막(수카)을 짓고 그 안에서 생활하며, 하나님의 보호하심을 기억해요. 장차 임할 하나님 나라의 잔치를 예표하는 절기입니다.'
    },
    'Chanukah': {
      icon: '🕎',
      desc: '"봉헌, 헌신"이라는 뜻으로, 기원전 165년 마카비 가문이 성전을 탈환하고 재봉헌한 것을 기념합니다. 8일간 하누키아(9개 촛대)에 불을 밝히는 절기예요. 단 하루치 기름이 8일을 밝힌 기적을 기억하며, 어둠을 이기는 빛의 승리를 축하합니다.'
    },
    'Purim': {
      icon: '🎭',
      desc: '"제비"라는 뜻으로, 에스더서에 기록된 하만의 음모에서 유대 민족이 구원받은 것을 기념하는 절기입니다. 에스더서를 낭독하고 축제를 즐기는 기쁨의 절기예요. 하나님의 보이지 않는 섭리와 구원을 기억하는 날입니다.'
    },
    'Shemini Atzeret': {
      icon: '✨',
      desc: '"여덟째 날의 모임"이라는 뜻으로, 숙콧(초막절) 바로 다음 날 지키는 절기입니다. 절기를 마무리하며 하나님 앞에 한 번 더 모이는 특별한 날이에요.'
    },
    'Simchat Torah': {
      icon: '📜',
      desc: '"토라의 기쁨"이라는 뜻으로, 1년 토라 낭독 주기가 끝나고 다시 베레쉬트(창세기)로 돌아가는 것을 축하하는 절기입니다. 토라 두루마리를 들고 기쁘게 춤을 추며 경배해요.'
    },
    'Tisha B\'Av': {
      icon: '😔',
      desc: '"아브월 9일"이라는 뜻으로, 솔로몬 성전과 제2성전이 모두 파괴된 날을 애도하는 금식일입니다. 이스라엘 민족의 가장 슬픈 날로, 회복과 구원을 간구하는 날이에요.'
    },
  };

  function holidayKo(title) {
    for(const [en, ko] of Object.entries(HOLIDAY_KO)) {
      if(title.includes(en)) return { ko, en };
    }
    return { ko: title, en: null };
  }

  function getHolidayInfo(holidays) {
    // 원본 영어 제목으로 HOLIDAY_INFO 매칭
    for(const h of holidays) {
      for(const [en, info] of Object.entries(HOLIDAY_INFO)) {
        if(h.title && h.title.includes(en)) return info;
      }
    }
    return { icon: '⭐', desc: null };
  }

  function toISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function toKoDate(iso) {
    const [y,m,d] = iso.split('-').map(Number);
    return `${y}년 ${MONTH_KO[m-1]} ${d}일`;
  }

  function addDays(d, n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }

  async function load() {
    // URL에서 shabbat 파라미터 가져오기
    const params = new URLSearchParams(location.search);
    const shabbatISO = params.get('shabbat') || toISO(new Date());

    try {
      // 해당 주 + 전후 3주 범위로 조회
      const start = toISO(addDays(new Date(shabbatISO), -14));
      const end   = toISO(addDays(new Date(shabbatISO), +14));
      const url = `https://www.hebcal.com/hebcal?v=1&cfg=json&s=on&maj=on&min=off&mod=off&nx=off&mf=off&ss=off&c=off&geo=none&start=${start}&end=${end}&i=off&leyning=on&t=${Date.now()}`;
      const res = await fetch(url, { cache: 'no-store' });
      const data = await res.json();
      const items = data.items || [];

      // 이번 주 명절 찾기
      const holidays = items.filter(it =>
        it.category === 'holiday' &&
        it.date?.split('T')[0] >= start &&
        it.date?.split('T')[0] <= end
      );

      // 이전 포션 (shabbatISO 이전 토요일)
      const prevParshas = items.filter(it =>
        it.category === 'parashat' &&
        it.date?.split('T')[0] < shabbatISO
      );
      const prevParsha = prevParshas[prevParshas.length - 1];

      // 다음 포션 (shabbatISO 이후 토요일)
      const nextParsha = items.find(it =>
        it.category === 'parashat' &&
        it.date?.split('T')[0] > shabbatISO
      );

      // 명절 이름 (중복 제거)
      const holidayNames = [...new Set(
        holidays.map(h => holidayKo(h.title).ko).filter(Boolean)
      )];

      render(shabbatISO, holidayNames, holidays, prevParsha, nextParsha);

    } catch(e) {
      document.getElementById('app').innerHTML =
        `<div class="loading"><span>정보를 불러오지 못했어요.<br>${e.message}</span></div>`;
    }
  }

  function render(shabbatISO, holidayNames, holidays, prevParsha, nextParsha) {
    const holidayStr = holidayNames.length > 0
      ? holidayNames.join(' · ')
      : '명절 특별 낭독';

    const info = getHolidayInfo(holidays);

    const prevName = prevParsha ? pKo(prevParsha.title) : null;
    const prevDate = prevParsha ? prevParsha.date?.split('T')[0] : null;
    const nextName = nextParsha ? pKo(nextParsha.title) : null;
    const nextDate = nextParsha ? nextParsha.date?.split('T')[0] : null;

    document.getElementById('app').innerHTML = `
      <div class="main-card">
        <div class="special-icon">${info.icon}</div>
        <div class="special-label">이번주 토라포션</div>
        <div class="holiday-name">${holidayStr}</div>
        <div class="special-title">특별 낭독 주간</div>
        <div class="special-desc">
          이번 주는 명절 특별 낭독이 진행됩니다.<br>
          일반 토라 포션 낭독은 쉬어가는 주간이에요.
        </div>
      </div>

      ${info.desc ? `
      <div class="holiday-desc-card">
        <div class="holiday-desc-title">${info.icon} ${holidayStr}란?</div>
        <div class="holiday-desc-text">${info.desc}</div>
      </div>` : ''}

      <div class="shabbat-date">샤밧 · ${toKoDate(shabbatISO)}</div>

      <div class="parsha-nav">
        ${prevParsha ? `
        <a class="parsha-nav-card" href="index.html?shabbat=${prevDate}">
          <div class="parsha-nav-label">← 지난 주 포션</div>
          <div class="parsha-nav-name">${prevName}</div>
          <div class="parsha-nav-date">${toKoDate(prevDate)}</div>
        </a>` : '<div></div>'}

        ${nextParsha ? `
        <a class="parsha-nav-card" href="index.html?shabbat=${nextDate}">
          <div class="parsha-nav-label">다음 주 포션 →</div>
          <div class="parsha-nav-name">${nextName}</div>
          <div class="parsha-nav-date">${toKoDate(nextDate)}</div>
        </a>` : '<div></div>'}
      </div>
