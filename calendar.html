<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light only">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토라 포션 캘린더</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg-info: #e6f1fb;
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #c0bebb;
      --text-info: #185fa5;
      --text-sun: #d93636;
      --text-sat: #1a5fc8;
      --border: rgba(0,0,0,0.09);
      --r: 14px;
      --bar: #d1d1cf;
      --bar-text: #3a3a38;
      --bar-current: #e8534a;
      --bar-current-text: #fff;
      --bar-special: #e8e0f5;
      --bar-special-text: #6b4fa0;
      --bg-primary: #ffffff;
      --border-tertiary: rgba(0,0,0,0.09);
      --radius-md: 8px;
    }

    

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg2);
      color: var(--text);
      min-height: 100vh;
      padding: 0 1.5rem;
    }

    .wrap { max-width: 980px; margin: 0 auto; }

    /* 네비 */
    .top-nav { position:sticky; top:0; z-index:100; background:var(--bg2); display:flex; justify-content:space-between; align-items:center; height:48px; padding:0; margin-bottom:1.5rem; flex-shrink:0; }

    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      font-size:13px; color:var(--text-info); text-decoration:none;
      padding:6px 12px; border:0.5px solid var(--border-tertiary);
      border-radius:var(--radius-md); background:var(--bg-primary);
      transition:all .15s; white-space:nowrap;
      height:32px; box-sizing:border-box;
    }
    .back-btn:hover { border-color:var(--text-info); background:var(--bg-info); }

    /* 월 헤더 */
    .month-hd { display:flex; align-items:center; gap:14px; margin-bottom:1.25rem; }
    .month-title { font-size:30px; font-weight:500; line-height:1; }

    .nav-btn {
      width:32px; height:32px; border-radius:50%;
      border:0.5px solid var(--border); background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--text2); transition:all .15s; flex-shrink:0;
    }
    .nav-btn:hover { border-color:var(--text-info); color:var(--text-info); }

    /* 달력 */
    .cal {
      background:var(--bg); border:0.5px solid var(--border);
      border-radius:var(--r); overflow:hidden;
    }

    /* 요일 헤더 */
    .dow-row { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:0.5px solid var(--border); }
    .dow-cell { padding:7px 0; text-align:center; font-size:12px; font-weight:500; color:#1a1a18; }
    .dow-cell.sun { color:var(--text-sun); }
    .dow-cell.sat { color:var(--text-sat); }

    /* 주 행 */
    .week-row {
      display:grid; grid-template-columns:repeat(7,1fr);
      border-bottom:0.5px solid var(--border);
    }
    .week-row:last-child { border-bottom:none; }

    /* 날짜 셀 */
    .dc {
      min-height:110px; padding:6px 8px 6px;
      border-right:0.5px solid var(--border);
      display: block;
      text-decoration: none;
      color: inherit;
      cursor: default;
    }
    a.dc { cursor: pointer; }
    a.dc:hover { background: #f0f4f8; }
    .dc:last-child { border-right:none; }

    .dn {
      font-size:12px; color:var(--text); line-height:1;
      text-align: center;
      width: 24px;
      margin: 0 auto;
      padding-top: 2px;
    }
    .dc.other .dn { color:var(--text3); font-size:11px; width:auto; text-align:center; }

    .dc.sun-col:not(.other) .dn { color:var(--text-sun); }
    .dc.sat-col:not(.other) .dn { color:var(--text-sat); }

    /* 오늘 — 연한 파란 배경 + 네이비 테두리 */
    .dc.today {
      background: #DEEBF8;
      outline: 1.5px solid #195FA4;
      outline-offset: -1px;
      position: relative;
      z-index: 2;
    }
    .dc.today .dn { color: #195FA4; font-weight: 600; }
    .dc.today .cell-parsha { color: #195FA4; font-weight: 700; }
    .dc.today .cell-aliyah { color: #1a1a18; }

    /* 셀 내 포션 표시 */
    .cell-parsha {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #444;
      text-decoration: none;
      margin-top: 16px;
      line-height: 1.4;
      word-break: keep-all;
      overflow: hidden;
    }
    .cell-parsha:hover { color: var(--text-info); }
    .cell-parsha.current { color: #1a1a18; }
    .cell-parsha.sat { color: #444; }
    .cell-parsha.sat.current { color: #1a1a18; }
    .cell-parsha.special {
      color: #888;
      font-weight: 400;
      text-align: center;
      width: 100%;
    }
    .dc.special-cell { background: #f2f2f0; }
    .dc.special-cell .dn { color: #aaa; }

    .cell-aliyah {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* 토요일은 br태그로 줄바꿈하므로 nowrap 해제 */
    .dc.sat-col .cell-aliyah {
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
    }

    /* 로딩 */
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 0; gap:12px; color:var(--text3); font-size:14px; }
    .sp { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--text-info); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .err { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--r); padding:1.5rem; text-align:center; color:var(--text2); font-size:14px; line-height:1.7; }

    .footer { text-align:center; font-size:12px; color:var(--text3); padding-top:1.5rem; }
    .footer a { color:var(--text-info); text-decoration:none; }

    @media(max-width:768px) {
      body { padding: 1rem 0.5rem; }
      .month-title { font-size:18px; }
      body { padding: 0 0.75rem; }
      .top-nav { margin-bottom:1rem; height:48px; }
      .back-btn { font-size:12px; padding:5px 10px; height:30px; }
      .top-nav { height:48px; }
      .dow-cell { font-size:9px; padding:6px 0; }
      .dc { min-height:120px; padding:4px 3px 5px; overflow:hidden; }
      .dn { font-size:9px; }
      .cell-parsha { font-size:9px; margin-top:8px; line-height:1.3; word-break:keep-all; white-space:normal; }
      .cell-aliyah { font-size:9px; margin-top:3px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .dc.sat-col .cell-aliyah { white-space:normal; overflow:visible; text-overflow:unset; }
    }

    @media(max-width:480px) {
      .dc { min-height:110px; padding:4px 2px 5px; }
      .dn { font-size:8px; }
      .cell-parsha { font-size:8px; margin-top:7px; }
      .cell-aliyah { font-size:8px; }
    }

    @media(max-width:380px) {
      .dc { min-height:95px; padding:3px 2px 4px; }
      .dn { font-size:7.5px; }
      .cell-parsha { font-size:7.5px; margin-top:6px; }
      .cell-aliyah { font-size:7.5px; }
    }
  
    /* ── 라이트모드 강제 고정 ── */
    :root, body {
      color-scheme: light only;
      background-color: #f7f6f2 !important;
      color: #1c1a16 !important;
    }
    
  </style>
</head>
<body>
<div class="wrap">

  <div class="top-nav">
    <a href="index.html" class="back-btn"><i class="ti ti-arrow-left"></i> 오늘 토라포션</a>
    <a href="calendor_timeline.html" class="back-btn"><i class="ti ti-list"></i> 타임라인 보기</a>
  </div>

  <div class="month-hd">
    <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
    <div class="month-title" id="mtitle">...</div>
    <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
  </div>

  <div id="cal" class="cal">
    <div class="loading"><div class="sp"></div><span>불러오는 중...</span></div>
  </div>

  <div class="footer">포션 일정: <a href="https://www.hebcal.com/sedrot/" target="_blank">Hebcal Jewish Calendar</a></div>

</div>
<script>
  const MKO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const PKO = {
    'Bereshit':'베레쉬트','Noach':'노아흐','Lech-Lecha':'레흐-레하',
    'Vayeira':'바예라','Chayei Sara':'하예 사라','Toldot':'톨도트',
    'Vayetzei':'바예체이','Vayishlach':'바이쉴라흐','Vayeshev':'바예쉐브',
    'Miketz':'미케쯔','Vayigash':'바이가쉬','Vayechi':'바예히',
    'Shemot':'쉐모트','Vaeira':'바에라','Bo':'보',
    'Beshalach':'베샬라흐','Yitro':'이트로','Mishpatim':'미쉬파팀',
    'Terumah':'테루마','Tetzaveh':'테짜베','Ki Tisa':'키 티사',
    'Vayakhel':'바야크헬','Pekudei':'페쿠데이','Vayakhel-Pekudei':'바야크헬-페쿠데이',
    'Vayikra':'바이크라','Tzav':'짜브','Shmini':'쉬미니',
    'Tazria':'타즈리아','Metzora':'메쪼라','Tazria-Metzora':'타즈리아-메쪼라',
    'Achrei Mot':'아하레이 모트','Kedoshim':'카도쉼','Achrei Mot-Kedoshim':'아하레이 모트-카도쉼',
    'Emor':'에모르','Behar':'베하르','Bechukotai':'베호코타이',
    'Behar-Bechukotai':'베하르-베호코타이',
    'Bamidbar':'베미드바르','Nasso':'나쏘',"Beha'alotcha":'베하알로트카',
    "Sh'lach":'쉘라흐','Korach':'코라흐','Chukat':'후카트',
    'Balak':'발락','Chukat-Balak':'후카트-발락','Pinchas':'핀하스',
    'Matot':'마토트','Masei':'마세이','Matot-Masei':'마토트-마세이',
    'Devarim':'데바림','Vaetchanan':'바에트하난','Eikev':'에케브',
    "Re'eh":'레에','Shoftim':'쇼프팀','Ki Teitzei':'키 테체이',
    'Ki Tavo':'키 타보','Nitzavim':'니차빔','Vayeilech':'바옐레흐',
    'Nitzavim-Vayeilech':'니차빔-바옐레흐',"Ha'azinu":'하아지누',
    'Vezot Haberakhah':'베조트 하베라하'
  };

  function pKo(t) { const n=t.replace(/^Parashat\s+/i,'').trim(); return PKO[n]||n; }

  const BOOK_KO = {
    'Genesis':'창세기','Exodus':'출애굽기','Leviticus':'레위기',
    'Numbers':'민수기','Deuteronomy':'신명기'
  };
  function rangeKo(r) {
    return r.replace(/Genesis|Exodus|Leviticus|Numbers|Deuteronomy/g, m => BOOK_KO[m]||m);
  }
  // 모바일용: "레위기 21:1-21:16" → "레위기<br>21:1-21:16"
  function rangeKoMobile(r) {
    const ko = rangeKo(r);
    return ko.replace(/^(창세기|출애굽기|레위기|민수기|신명기) (\S)/, '$1<br>$2');
  }

  // 토라 포션 전체 고정 주차 (1~54번째 포션 순서)
  // 합쳐진 포션(더블 파샤)은 단독 포션과 같은 번호 부여
  const PARSHA_WEEK_NUM = {
    'Bereshit':1,'Noach':2,'Lech-Lecha':3,'Vayeira':4,'Chayei Sara':5,
    'Toldot':6,'Vayetzei':7,'Vayishlach':8,'Vayeshev':9,'Miketz':10,
    'Vayigash':11,'Vayechi':12,'Shemot':13,'Vaeira':14,'Bo':15,
    'Beshalach':16,'Yitro':17,'Mishpatim':18,'Terumah':19,'Tetzaveh':20,
    'Ki Tisa':21,'Vayakhel':22,'Pekudei':23,'Vayakhel-Pekudei':'22-23',
    'Vayikra':24,'Tzav':25,'Shmini':26,'Tazria':27,'Metzora':28,
    'Tazria-Metzora':'27-28','Achrei Mot':29,'Kedoshim':30,
    'Achrei Mot-Kedoshim':'29-30','Emor':31,'Behar':32,'Bechukotai':33,
    'Behar-Bechukotai':'32-33','Bamidbar':34,'Nasso':35,"Beha'alotcha":36,
    "Sh'lach":37,'Korach':38,'Chukat':39,'Balak':40,'Chukat-Balak':'39-40',
    'Pinchas':41,'Matot':42,'Masei':43,'Matot-Masei':'42-43',
    'Devarim':44,'Vaetchanan':45,'Eikev':46,"Re'eh":47,'Shoftim':48,
    'Ki Teitzei':49,'Ki Tavo':50,'Nitzavim':51,'Vayeilech':52,
    'Nitzavim-Vayeilech':'51-52',"Ha'azinu":53,'Vezot Haberakhah':54
  };

  function getParshaWeekNum(enTitle) {
    const name = enTitle.replace(/^Parashat\s+/i,'').trim();
    const num = PARSHA_WEEK_NUM[name];
    return num !== undefined ? num : null;
  }

  function toISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function addDays(d, n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }

  function getThisShabbat() {
    const now = new Date();
    const dow = now.getDay(); // 0=일, 1=월 ... 6=토
    // 포션은 토요일 시작 → 다음 금요일 끝
    // 오늘이 토요일이면 오늘이 새 포션 시작일
    // 오늘이 일~금이면 지난주 토요일이 현재 포션의 샤밧
    const diff = dow === 6 ? 0 : -(dow + 1);
    return toISO(addDays(now, diff));
  }

  // 해당 월 + 앞뒤 여유 포함해서 포션 + 명절 fetch
  async function fetchParshas(year, month) {
    const start = toISO(new Date(year, month-1, -6));
    const end   = toISO(new Date(year, month, 14));
    // maj=on 으로 명절도 같이 가져옴
    const url = `https://www.hebcal.com/hebcal?v=1&cfg=json&s=on&maj=on&min=off&mod=off&nx=off&mf=off&ss=off&c=off&geo=none&start=${start}&end=${end}&i=off&leyning=on&t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const parshaMap  = {};
    const holidaySet = new Set();

    (data.items||[]).forEach(it=>{
      const d = it.date?.split('T')[0];
      if(!d) return;
      if(it.category==='parashat'){
        const enName = it.title.replace(/^Parashat\s+/i,'').trim();
        const koName = pKo(it.title);
        const weekNum = getParshaWeekNum(it.title);
        const ley = it.leyning || {};
        const aliyot = [null]; // index 0 비움, aliyot[1]~aliyot[6]
        for(let i=1;i<=6;i++) aliyot.push(ley[String(i)] || null);
        const summary = ley['summary'] || null;
        parshaMap[d] = { name: koName, weekNum, aliyot, summary };
      }
      if(it.category==='holiday'){
        const date = new Date(d+'T00:00:00');
        if(date.getDay()===6) holidaySet.add(d);
      }
    });

    // 포션이 없는 토요일 중 명절 주간 → '특별 낭독 주간' 으로 마킹
    // 날짜 범위 내 모든 토요일 순회
    const startD = new Date(start+'T00:00:00');
    const endD   = new Date(end+'T00:00:00');
    for(let d=new Date(startD); d<=endD; d.setDate(d.getDate()+1)){
      if(d.getDay()===6){
        const iso = toISO(d);
        if(!parshaMap[iso]){
          let hasHoliday = false;
          for(let h of holidaySet){
            const diff = Math.abs(new Date(h+'T00:00:00') - new Date(iso+'T00:00:00'));
            if(diff <= 3*24*60*60*1000){ hasHoliday=true; break; }
          }
          if(hasHoliday) parshaMap[iso] = { name: '__special__', weekNum: null };
        }
      }
    }

    return parshaMap;
  }

  const todayISO    = toISO(new Date());
  const thisShabbat = getThisShabbat();
  let Y = new Date().getFullYear();
  let M = new Date().getMonth()+1;

  async function render() {
    document.getElementById('mtitle').textContent = `${Y}년 ${MKO[M-1]}`;
    const cal = document.getElementById('cal');
    cal.innerHTML = `<div class="loading"><div class="sp"></div><span>불러오는 중...</span></div>`;

    let pm={};
    try { pm = await fetchParshas(Y,M); }
    catch(e){ cal.innerHTML=`<div class="err">포션 정보를 불러오지 못했어요.<br><small>${e.message}</small></div>`; return; }

    // ── 날짜 셀 구성 (일요일 시작)
    const first = new Date(Y,M-1,1);
    const last  = new Date(Y,M,0);
    const startDow = first.getDay();
    const cells = [];

    for(let i=startDow-1;i>=0;i--){
      const d=addDays(first,-i-1);
      cells.push({d,iso:toISO(d),cur:false,other:true,dow:d.getDay()});
    }
    for(let n=1;n<=last.getDate();n++){
      const d=new Date(Y,M-1,n);
      cells.push({d,iso:toISO(d),cur:d.getMonth()===M-1,other:false,dow:d.getDay()});
    }
    // 항상 42칸(6주) 고정 — 뒤를 다음달 날짜로 채움
    let nextDay = 1;
    while(cells.length < 42){
      const d=new Date(Y,M,nextDay++);
      cells.push({d,iso:toISO(d),cur:false,other:true,dow:d.getDay()});
    }

    const weeks=[];
    for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));

    function getParshaForCell(cell) {
      // 토요일 → 이번 주 샤밧 포션
      if(cell.dow === 6) {
        return pm[cell.iso] ? { ...pm[cell.iso], aliyah: 0 } : null;
      }
      // 일~금 → 지난 주 토요일 포션
      // 일(0)→알리야1, 월(1)→2, 화(2)→3, 수(3)→4, 목(4)→5, 금(5)→6
      const lastSat = toISO(addDays(cell.d, -(cell.dow + 1)));
      if(pm[lastSat]) {
        const aliyah = cell.dow + 1; // 일=1, 월=2 ... 금=6
        return { ...pm[lastSat], aliyah, shabbatISO: lastSat };
      }
      return null;
    }

    // ── HTML 생성
    let html = `<div class="dow-row">`;
    ['일','월','화','수','목','금','토'].forEach((d,i)=>{
      html+=`<div class="dow-cell ${i===0?'sun':i===6?'sat':''}">${d}</div>`;
    });
    html+=`</div>`;

    weeks.forEach(week=>{
      html+=`<div class="week-row">`;

      const isMobile = window.innerWidth <= 768;
      const rangeFn = isMobile ? rangeKoMobile : rangeKo;

      week.forEach(cell=>{
        const sc = cell.dow===0?'sun-col':cell.dow===6?'sat-col':'';
        const tc = cell.iso===todayISO?'today':'';
        const oc = cell.other?'other':'';
        const parsha = (!cell.other) ? getParshaForCell(cell) : null;

        let parshaHtml = '';
        let cellHref = '';

        if(parsha) {
          const isSpecial = parsha.name === '__special__';
          const isCurrent = (parsha.shabbatISO || cell.iso) === thisShabbat;

          if(isSpecial) {
            const satISO = cell.dow === 6 ? cell.iso : parsha.shabbatISO;
            cellHref = `special.html?shabbat=${satISO}`;
            parshaHtml = `<span class="cell-parsha special">특별 낭독 주간</span>`;

          } else if(cell.dow === 6) {
            // 토요일: 포션명 + 전체 범위(aliyot1 시작 ~ aliyot6 끝)
            cellHref = `index.html?shabbat=${cell.iso}`;
            const cls = isCurrent ? 'cell-parsha sat current' : 'cell-parsha sat';
            const a1 = parsha.aliyot?.[1];
            const a6 = parsha.aliyot?.[6] || parsha.aliyot?.[5] || parsha.aliyot?.[4];
            let fullRange = '';
            if(a1 && a6) {
              const start = a1.split('-')[0].trim();
              const end   = a6.split('-').pop().trim();
              if(isMobile) {
                // "레위기 25:1" → "레위기<br>25:1 - 27:15"
                const startKo = rangeKo(start).replace(/^(창세기|출애굽기|레위기|민수기|신명기) (\S)/, '$1<br>$2');
                fullRange = `${startKo} - ${end}`;
              } else {
                fullRange = `${rangeKo(start)} - ${end}`;
              }
            } else if(a1) {
              fullRange = rangeFn(a1);
            }
            const rangeHtml = fullRange ? `<span class="cell-aliyah">${fullRange}</span>` : '';
            parshaHtml = `<span class="${cls}">${parsha.name}</span>${rangeHtml}`;

          } else {
            // 일~금: 포션명 + 알리야 번호 + 구절
            cellHref = `index.html?shabbat=${parsha.shabbatISO}`;
            const cls = isCurrent ? 'cell-parsha current' : 'cell-parsha';
            const aliyahRange = parsha.aliyot?.[parsha.aliyah];
            const rangeHtml = aliyahRange ? `<span class="cell-aliyah">${rangeFn(aliyahRange)}</span>` : '';
            parshaHtml = `<span class="${cls}">${parsha.name} ${parsha.aliyah}</span>${rangeHtml}`;
          }
        }

        const dayNum = cell.d.getDate();
        const dnText = (cell.other && dayNum === 1) ? `${cell.d.getMonth()+1}월 1일` : dayNum;
        const tag = cellHref ? 'a' : 'div';
        const hrefAttr = cellHref ? `href="${cellHref}"` : '';
        const specialCls = (parsha?.name === '__special__') ? 'special-cell' : '';

        html+=`<${tag} class="dc ${sc} ${tc} ${oc} ${specialCls}" ${hrefAttr}>
          <div class="dn">${dnText}</div>
          ${parshaHtml}
        </${tag}>`;
      });

      html+=`</div>`;
    });

    cal.innerHTML=html;
  }

  function changeMonth(d){
    M+=d;
    if(M>12){M=1;Y++;}
    if(M<1){M=12;Y--;}
    render();
  }

  render();
</script>
</body>
</html>
