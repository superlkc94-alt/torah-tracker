<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light only">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토라 포션 트래커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --border-tertiary: rgba(0,0,0,0.12);
      --border-secondary: rgba(0,0,0,0.22);
      --border-success: #97c459;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    .container { width: 100%; max-width: 680px; }

    /* 상단 네비 */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .timeline-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-info);
      text-decoration: none;
      padding: 6px 12px;
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      transition: all 0.15s;
    }

    .timeline-btn:hover {
      border-color: var(--text-info);
      background: var(--bg-info);
    }

    .calendar-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-info);
      text-decoration: none;
      padding: 6px 12px;
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      transition: all 0.15s;
    }

    .calendar-btn:hover {
      border-color: var(--text-info);
      background: var(--bg-info);
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
      gap: 12px;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-tertiary);
      border-top-color: var(--text-info);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
    }

    .week-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
    }

    .portion-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0;
      color: #5a5a5a;
      text-transform: none;
      margin-bottom: 4px;
    }

    .portion-name {
      font-size: 32px;
      font-weight: 700;
      color: #2a2a2a;
      line-height: 1.2;
      font-family: 'Noto Serif KR', serif;
    }

    .portion-hebrew {
      display: inline;
      font-size: 20px;
      color: #888;
      font-family: serif;
      direction: rtl;
      unicode-bidi: embed;
      font-weight: 400;
    }

    /* 1. Hebcal 자동 연동 배지 제거 */
    .week-badge { display: none; }

    .section-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: #5a5a5a;
      text-transform: none;
      margin-bottom: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .info-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }

    .info-card-label { font-size: 13px; color: #5a5a5a; margin-bottom: 4px; font-weight: 500; }
    .info-card-value { font-size: 16px; font-weight: 500; color: var(--text-primary); }

    .calendar {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .cal-header {
      display: grid;
      grid-template-columns: 2fr 2.5fr 1fr;
      padding: 10px 16px;
      border-bottom: 0.5px solid var(--border-tertiary);
      background: var(--bg-secondary);
    }

    .cal-header span {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #5a5a5a;
      text-transform: uppercase;
    }

    .cal-row {
      display: grid;
      grid-template-columns: 2fr 2.5fr 1fr;
      padding: 11px 16px;
      border-bottom: 0.5px solid var(--border-tertiary);
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cal-row:last-child { border-bottom: none; }
    .cal-row:hover { background: var(--bg-secondary); }
    .cal-row.checked { opacity: 0.5; }
    .cal-row.today .day-name { color: var(--text-info); font-weight: 500; }

    .today-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-info);
      margin-left: 5px;
      vertical-align: middle;
    }

    .day-name { font-size: 15px; color: #444444; font-weight: 500; }
    .day-date { font-size: 13px; color: #5a5a5a; margin-top: 1px; }
    .range { font-size: 15px; color: #444444; font-weight: 500; }

    .check-wrap { display: flex; justify-content: flex-end; }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border-secondary);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .check-btn:hover { border-color: var(--text-info); }
    .check-btn.done { background: var(--bg-success); border-color: var(--border-success); }
    .check-btn i { font-size: 14px; color: transparent; }
    .check-btn.done i { color: var(--text-success); }

    .progress-bar-wrap { margin-bottom: 2rem; }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .progress-track {
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 100px;
      overflow: hidden;
      border: 0.5px solid var(--border-tertiary);
    }

    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: var(--text-success);
      transition: width 0.35s ease;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
      padding-top: 1rem;
      border-top: 0.5px solid var(--border-tertiary);
    }

    .footer a { color: var(--text-info); text-decoration: none; }

    @media (max-width: 480px) {
      .portion-name { font-size: 22px; }
      .cal-row { grid-template-columns: 1.8fr 2fr 1fr; }
    }
  
    /* ── 라이트모드 강제 고정 ── */
    :root, body {
      color-scheme: light only;
      background-color: #f7f6f2 !important;
      color: #1c1a16 !important;
    }
    
  </style>
</head>
<body>
  <div class="container">

    <div class="top-nav">
      <a href="calendor_timeline.html" class="timeline-btn">
        <i class="ti ti-list"></i>
        포션 일정
      </a>
      <a href="calendar.html" class="calendar-btn">
        <i class="ti ti-calendar"></i>
        전체 캘린더 보기
      </a>
    </div>

    <div id="app">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>포션 정보 불러오는 중...</span>
      </div>
    </div>

  </div>

  <script>
    const DAY_KO = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
    const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

    const BOOK_MAP = {
      // 모세오경 (토라)
      'Genesis':'창세기','Exodus':'출애굽기','Leviticus':'레위기',
      'Numbers':'민수기','Deuteronomy':'신명기',
      // 선지서 (하프타라)
      'Joshua':'여호수아','Judges':'사사기',
      'I Samuel':'사무엘상','II Samuel':'사무엘하',
      'I Kings':'열왕기상','II Kings':'열왕기하',
      'Isaiah':'이사야','Jeremiah':'예레미야','Ezekiel':'에스겔',
      'Hosea':'호세아','Joel':'요엘','Amos':'아모스',
      'Obadiah':'오바댜','Jonah':'요나','Micah':'미가',
      'Nahum':'나훔','Habakkuk':'하박국','Zephaniah':'스바냐',
      'Haggai':'학개','Zechariah':'스가랴','Malachi':'말라기'
    };

    // 하프타라 특별 명칭 제거 (| Shabbat Machar Chodesh 등)
    function formatHaftara(str) {
      if (!str) return '';
      // "|" 이후 특별 명칭 제거
      str = str.replace(/\s*\|.*$/, '').trim();
      // 책 이름 한국어 변환
      for (const [en, ko] of Object.entries(BOOK_MAP)) {
        if (str.includes(en)) str = str.replace(en, ko);
      }
      return str;
    }

    const PARSHA_KO = {
      'Bereshit':'베레쉬트','Noach':'노아흐','Lech-Lecha':'레흐-레하',
      'Vayeira':'바예라','Chayei Sara':'하예 사라','Toldot':'톨도트',
      'Vayetzei':'바예체이','Vayishlach':'바이쉴라흐','Vayeshev':'바예쉐브',
      'Miketz':'미케쯔','Vayigash':'바이가쉬','Vayechi':'바예히',
      'Shemot':'쉐모트','Vaeira':'바에라','Bo':'보',
      'Beshalach':'베샬라흐','Yitro':'이트로','Mishpatim':'미쉬파팀',
      'Terumah':'테루마','Tetzaveh':'테짜베','Ki Tisa':'키 티사',
      'Vayakhel':'바야크헬','Pekudei':'페쿠데이','Vayakhel-Pekudei':'바야크헬-페쿠데이',
      'Vayikra':'바이크라','Tzav':'짜브','Shmini':'쉬미니',
      'Tazria':'타즈리아','Metzora':'메쪼라','Tazria-Metzora':'타즈리아-메쪼라',
      'Achrei Mot':'아하레이 모트','Kedoshim':'카도쉼','Achrei Mot-Kedoshim':'아하레이 모트-카도쉼',
      'Emor':'에모르','Behar':'베하르','Bechukotai':'베호코타이',
      'Behar-Bechukotai':'베하르-베호코타이',
      'Bamidbar':'베미드바르','Nasso':'나쏘',"Beha'alotcha":'베하알로트카',
      "Sh'lach":'쉘라흐','Korach':'코라흐','Chukat':'후카트',
      'Balak':'발락','Chukat-Balak':'후카트-발락','Pinchas':'핀하스',
      'Matot':'마토트','Masei':'마세이','Matot-Masei':'마토트-마세이',
      'Devarim':'데바림','Vaetchanan':'바에트하난','Eikev':'에케브',
      "Re'eh":'레에','Shoftim':'쇼프팀','Ki Teitzei':'키 테체이',
      'Ki Tavo':'키 타보','Nitzavim':'니차빔','Vayeilech':'바옐레흐',
      'Nitzavim-Vayeilech':'니차빔-바옐레흐',"Ha'azinu":'하아지누',
      'Vezot Haberakhah':'베조트 하베라하'
    };

    function parshaKo(enTitle) {
      const name = enTitle.replace(/^Parashat\s+/i, '').trim();
      return PARSHA_KO[name] || name;
    }

    function bookKo(str) {
      if (!str) return '';
      for (const [en, ko] of Object.entries(BOOK_MAP)) {
        if (str.includes(en)) str = str.replace(en, ko);
      }
      return str;
    }

    function toISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,'0');
      const d = String(date.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }

    function toKoDate(dateStr) {
      const [y,m,d] = dateStr.split('-').map(Number);
      return `${MONTH_KO[m-1]} ${d}일`;
    }

    function getWeekDates() {
      const now = new Date();
      const day = now.getDay();
      const sunday = new Date(now);
      sunday.setDate(now.getDate() - day);
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(sunday);
        d.setDate(sunday.getDate() + i);
        dates.push(toISO(d));
      }
      return dates;
    }

    function storageKey(name) {
      return 'torah-tracker-' + name.toLowerCase().replace(/[\s/]+/g,'-');
    }

    function renderPage(parshaTitle, parshaHebrew, shabbatDate, fullRange, haftara, aliyot, weekDates) {
      const today = toISO(new Date());
      const key = storageKey(parshaTitle);
      const saved = localStorage.getItem(key);
      const checked = saved ? JSON.parse(saved) : new Array(7).fill(false);

      const dailyRanges = [];
      for (let i = 0; i < 6; i++) {
        dailyRanges.push(aliyot[i] ? bookKo(aliyot[i]) : bookKo(fullRange));
      }
      dailyRanges.push('전체 낭독 (샤밧)');

      const weekStart = toKoDate(weekDates[0]);
      const weekEnd   = toKoDate(weekDates[6]);

      document.getElementById('app').innerHTML = `
        <div class="week-header">
          <div>
            <div class="portion-title">이번주 토라포션</div>
            <div class="portion-name">${parshaTitle} <span class="portion-hebrew">(${parshaHebrew})</span></div>
          </div>
          <div>
            <div class="week-badge">Hebcal 자동 연동</div>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <div class="info-card-label">📖 토라</div>
            <div class="info-card-value">${bookKo(fullRange)}</div>
          </div>
          <div class="info-card">
            <div class="info-card-label">샤밧 낭독일</div>
            <div class="info-card-value">${toKoDate(shabbatDate)} (토)</div>
          </div>
          ${haftara ? `
          <div class="info-card" style="grid-column: 1 / -1;">
            <div class="info-card-label">📜 하프타라</div>
            <div class="info-card-value">${formatHaftara(haftara)}</div>
          </div>` : ''}
        </div>

        <div class="section-label">일별 읽기 체크 (${weekStart} – ${weekEnd})</div>
        <div class="calendar" id="calendar">
          <div class="cal-header">
            <span>요일</span>
            <span>읽기 범위</span>
            <span style="text-align:right">완료</span>
          </div>
        </div>

        <div class="progress-bar-wrap">
          <div class="progress-top">
            <span style="font-size:13px; color:var(--text-secondary)">주간 진행률</span>
            <span style="font-size:13px; font-weight:500; color:var(--text-primary)" id="progress-text">0 / 7일</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="footer">
          포션 일정: <a href="https://www.hebcal.com/sedrot/" target="_blank">Hebcal Jewish Calendar</a>
        </div>
      `;

      const cal = document.getElementById('calendar');

      function save() { localStorage.setItem(key, JSON.stringify(checked)); }

      function render() {
        document.querySelectorAll('.cal-row').forEach((r, i) => {
          r.classList.toggle('checked', checked[i]);
          const btn = r.querySelector('.check-btn');
          btn.classList.toggle('done', checked[i]);
          btn.querySelector('i').style.color = checked[i] ? 'var(--text-success)' : 'transparent';
        });
        const count = checked.filter(Boolean).length;
        document.getElementById('progress-text').textContent = count + ' / 7일';
        document.getElementById('progress-fill').style.width = Math.round(count / 7 * 100) + '%';
      }

      weekDates.forEach((dateStr, i) => {
        const d = new Date(dateStr + 'T00:00:00');
        const isToday = dateStr === today;
        const row = document.createElement('div');
        row.className = 'cal-row' + (isToday ? ' today' : '');
        row.innerHTML = `
          <div>
            <div class="day-name">${DAY_KO[d.getDay()]}${isToday ? '<span class="today-dot"></span>' : ''}</div>
            <div class="day-date">${toKoDate(dateStr)}</div>
          </div>
          <div class="range">${dailyRanges[i]}</div>
          <div class="check-wrap">
            <button class="check-btn" aria-label="${DAY_KO[d.getDay()]} 읽기 완료">
              <i class="ti ti-check" aria-hidden="true"></i>
            </button>
          </div>
        `;
        row.addEventListener('click', () => { checked[i] = !checked[i]; save(); render(); });
        cal.appendChild(row);
      });

      render();
    }

    async function loadParsha() {
      try {
        const weekDates = getWeekDates();

        // 가장 최근 토요일 날짜 계산 (로컬 시간 기준)
        const now = new Date();
        const dow = now.getDay(); // 0=일, 1=월 ... 6=토
        const diff = dow === 6 ? 0 : dow + 1; // 토요일이면 0, 일요일이면 1, 월요일이면 2...
        const lastSat = new Date(now);
        lastSat.setDate(now.getDate() - diff);

        // YYYY-MM-DD 형식 (로컬 시간 기준)
        const y = lastSat.getFullYear();
        const m = String(lastSat.getMonth() + 1).padStart(2, '0');
        const d = String(lastSat.getDate()).padStart(2, '0');
        const shabbatISO = `${y}-${m}-${d}`;

        const url = `https://www.hebcal.com/hebcal?v=1&cfg=json&s=on&maj=off&min=off&mod=off&nx=off&mf=off&ss=off&c=off&geo=none&start=${shabbatISO}&end=${shabbatISO}&i=off&leyning=on`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const item = data.items?.find(it => it.category === 'parashat');
        if (!item) throw new Error('포션 정보 없음');

        const shabbatDate = (item.date || '').split('T')[0] || weekDates[6];

        const parshaEn     = item.title || '';
        const parshaTitle  = parshaKo(parshaEn);
        const parshaHebrew = item.hebrew || '';
        const leyning      = item.leyning || {};
        const fullRange    = leyning.torah || '';
        const haftara      = leyning.haftarah || '';

        const aliyot = [];
        for (let i = 1; i <= 6; i++) {
          if (leyning[String(i)]) aliyot.push(leyning[String(i)]);
        }

        renderPage(parshaTitle, parshaHebrew, shabbatDate, fullRange, haftara, aliyot, weekDates);

      } catch (e) {
        console.error('오류:', e);
        document.getElementById('app').innerHTML = `
          <div class="error-box">
            포션 정보를 불러오지 못했어요.<br>
            인터넷 연결을 확인하고 새로고침 해주세요.<br><br>
            <small style="color:var(--text-tertiary)">${e.message}</small>
          </div>
        `;
      }
    }

    loadParsha();
  </script>
</body>
</html>
